  /* =====================================================
     搜索页
     ===================================================== */
  renderSearch(params) {
    const el = Pages.createPage('搜索');
    // 搜索栏
    const searchDiv = document.createElement('div');
    searchDiv.className = 'search-bar';
    searchDiv.innerHTML = `
      <div class="search-input-wrap">
        ${Icons.search}
        <input type="text" placeholder="搜索题目、选项、解析..." id="global-search" autofocus>
        <button class="search-clear" id="global-search-clear" style="display:none">${Icons.close}</button>
      </div>`;
    el.appendChild(searchDiv);
    const content = document.createElement('div');
    content.className = 'page-content';
    el.appendChild(content);

    content.innerHTML = `<div class="empty-state"><div style="color:var(--text3)">${Icons.search}</div><div class="empty-sub">输入关键词搜索题目</div></div>`;

    const searchInput = searchDiv.querySelector('#global-search');
    const clearBtn = searchDiv.querySelector('#global-search-clear');

    async function doSearch(query) {
      if (!query) { content.innerHTML = `<div class="empty-state"><div style="color:var(--text3)">${Icons.search}</div><div class="empty-sub">输入关键词搜索题目</div></div>`; return; }
      const allQs = await DB.getAllQuestions();
      const q = query.toLowerCase();
      const results = allQs.filter(x =>
        x.question.toLowerCase().includes(q) ||
        (x.answer && x.answer.toLowerCase().includes(q)) ||
        (x.explanation && x.explanation.toLowerCase().includes(q)) ||
        (x.options && x.options.some(o => o.toLowerCase().includes(q)))
      );
      if (!results.length) {
        content.innerHTML = `<div class="empty-state"><div class="empty-title">无结果</div><div class="empty-sub">换个关键词试试</div></div>`;
        return;
      }
      content.innerHTML = `
        <div class="fs-13" style="color:var(--text3);margin-bottom:10px">找到 ${results.length} 条结果</div>
        ${results.map(q => Pages.renderQCard(q)).join('')}
      `;
      content.querySelectorAll('.q-card').forEach(card => {
        card.onclick = () => {
          const qid = +card.dataset.qid;
          const idx = results.findIndex(q => q.id === qid);
          Nav.push('quiz', { questions: results, startIdx: idx, mode: 'practice' });
        };
      });
    }

    searchInput.oninput = Utils.debounce((e) => {
      const v = e.target.value.trim();
      clearBtn.style.display = v ? '' : 'none';
      doSearch(v);
    }, 300);
    clearBtn.onclick = () => { searchInput.value = ''; clearBtn.style.display = 'none'; doSearch(''); };
    if (params.query) { searchInput.value = params.query; doSearch(params.query); }
    return el;
  },

  /* =====================================================
     做题页面（核心模块）
     支持：practice / review / wrong / exam
     ===================================================== */
  renderQuiz(params) {
    const { questions, startIdx = 0, mode = 'practice', timeLimit = 0 } = params;
    const el = document.createElement('div');
    el.className = 'page';
    el.style.display = 'flex';
    el.style.flexDirection = 'column';

    let curIdx = startIdx;
    let answered = false;
    let userAnswer = null;
    let answers = new Array(questions.length).fill(null); // 记录作答
    let examTimer = null;
    let examSecLeft = timeLimit * 60;
    let examStartTime = Date.now();

    const isExam = mode === 'exam';
    const modeLabel = { practice:'练习', review:'学习', wrong:'错题练习', exam:'考试' }[mode] || '练习';

    // AppBar
    const appbar = document.createElement('div');
    appbar.className = 'appbar';
    appbar.innerHTML = `
      <button class="appbar-btn" onclick="this.closest('.page')._quit()">${Icons.close}</button>
      <span class="appbar-title">${modeLabel}</span>
      <div class="appbar-actions" id="quiz-appbar-right">
        ${isExam && timeLimit > 0 ? `<div class="exam-timer" id="exam-timer">${Icons.clock}<span id="timer-text">${Utils.fmtTime(examSecLeft)}</span></div>` : ''}
      </div>
    `;
    el.appendChild(appbar);

    // 进度条
    const progressDiv = document.createElement('div');
    progressDiv.className = 'quiz-header';
    progressDiv.innerHTML = `
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="quiz-progress" style="width:${(curIdx+1)/questions.length*100}%"></div>
      </div>
      <span class="quiz-count" id="quiz-count">${curIdx+1}/${questions.length}</span>
    `;
    el.appendChild(progressDiv);

    // 题目区域
    const body = document.createElement('div');
    body.className = 'quiz-body';
    el.appendChild(body);

    // 底部操作栏
    const footer = document.createElement('div');
    footer.className = 'quiz-footer';
    el.appendChild(footer);

    function renderQ() {
      const q = questions[curIdx];
      if (!q) return;
      answered = answers[curIdx] !== null;
      userAnswer = answers[curIdx];

      // 更新进度（用 el.querySelector 而非 document.getElementById，兼容页面未挂载时）
      const progressFill = el.querySelector('#quiz-progress');
      const countEl = el.querySelector('#quiz-count');
      if (progressFill) progressFill.style.width = `${(curIdx+1)/questions.length*100}%`;
      if (countEl) countEl.textContent = `${curIdx+1}/${questions.length}`;

      const typeColors = { '单选':'var(--accent)', '判断':'var(--success)', '填空':'var(--warn)' };
      let qBody = '';
      // 多选题：userAnswer 存为字母数组
      let multiSelected = (q.type === '多选' && Array.isArray(userAnswer)) ? [...userAnswer] : [];

      if (q.type === '单选') {
        const opts = q.options || [];
        qBody = `<div class="option-list">
          ${opts.map((o, i) => {
            const letter = String.fromCharCode(65+i);
            let cls = '';
            if (answered) {
              if (letter === q.answer) cls = 'correct';
              else if (letter === userAnswer && userAnswer !== q.answer) cls = 'wrong';
            } else if (!isExam && letter === userAnswer) cls = 'selected';
            return `<div class="option-item ${cls}" data-letter="${letter}">
              <div class="option-letter">${letter}</div>
              <div class="option-text">${Utils.esc(o)}</div>
              ${answered && letter === q.answer ? `<div style="margin-left:auto;color:var(--success)">${Icons.check}</div>` : ''}
            </div>`;
          }).join('')}
        </div>`;
      } else if (q.type === '多选') {
        const opts = q.options || [];
        // 正确答案是字母字符串如 "ABC" 或数组
        const correctLetters = Array.isArray(q.answer) ? q.answer : (q.answer||'').split('').filter(c => /[A-Z]/.test(c));
        qBody = `
          ${!answered ? '<div style="font-size:12px;color:var(--text3);margin-bottom:10px">多选题，选完后点击提交</div>' : ''}
          <div class="option-list" id="multi-opts">
          ${opts.map((o, i) => {
            const letter = String.fromCharCode(65+i);
            const isCorrectOpt = correctLetters.includes(letter);
            const userChose = answered
              ? (Array.isArray(userAnswer) ? userAnswer.includes(letter) : (userAnswer||'').includes(letter))
              : multiSelected.includes(letter);
            let cls = '';
            if (answered) {
              if (isCorrectOpt) cls = 'correct';
              else if (userChose) cls = 'wrong';
            } else if (userChose) cls = 'selected';
            return `<div class="option-item ${cls}" data-letter="${letter}" style="position:relative">
              <div class="option-letter">${letter}</div>
              <div class="option-text">${Utils.esc(o)}</div>
              ${answered && isCorrectOpt ? `<div style="margin-left:auto;color:var(--success)">${Icons.check}</div>` : ''}
            </div>`;
          }).join('')}
          </div>`;
      } else if (q.type === '判断') {
        const opts = ['正确', '错误'];
        qBody = `<div class="option-list">
          ${opts.map(o => {
            let cls = '';
            if (answered) {
              if (o === q.answer) cls = 'correct';
              else if (o === userAnswer && userAnswer !== q.answer) cls = 'wrong';
            } else if (!isExam && o === userAnswer) cls = 'selected';
            return `<div class="option-item ${cls}" data-letter="${o}">
              <div class="option-letter">${o === '正确' ? '✓' : '✗'}</div>
              <div class="option-text">${o}</div>
              ${answered && o === q.answer ? `<div style="margin-left:auto;color:var(--success)">${Icons.check}</div>` : ''}
            </div>`;
          }).join('')}
        </div>`;
      } else {
        // 填空题
        const fillCorrect = answered ? isCorrect(q, userAnswer) : false;
        const allAnswers = q.answers && q.answers.length ? q.answers : [q.answer];
        qBody = `
          <div class="fill-input-wrap">
            <input class="fill-input" id="fill-answer" placeholder="输入你的答案..."
              value="${answered ? Utils.esc(userAnswer||'') : ''}"
              ${answered ? 'readonly' : ''}>
          </div>
          ${answered ? `
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
              <span class="tag ${fillCorrect ? 'tag-success' : 'tag-danger'}">
                ${fillCorrect ? '✓ 正确' : '✗ 错误'}
              </span>
            </div>
            <div style="background:var(--success-light);border-radius:10px;padding:12px;margin-bottom:8px">
              <div style="font-size:13px;color:var(--success);font-weight:600;margin-bottom:6px">正确答案</div>
              ${allAnswers.map((a, i) => `
                <div style="font-size:15px;color:var(--text);${i>0?'margin-top:4px;padding-top:4px;border-top:1px solid rgba(0,0,0,0.06)':''}">
                  ${i>0?`备选${i}：`:''}${Utils.esc(a)}
                </div>`).join('')}
            </div>
          ` : ''}
        `;
      }

      body.innerHTML = `
        <div class="quiz-type-badge">${q.type}</div>
        <div class="quiz-question">${Utils.esc(q.question)}</div>
        ${qBody}
        ${answered && q.explanation ? `
          <div class="explanation-box">
            <div class="explanation-title">💡 解析</div>
            <div class="explanation-text">${Utils.esc(q.explanation)}</div>
          </div>` : ''}
      `;

      // 选项点击
      if (!answered || isExam) {
        body.querySelectorAll('.option-item').forEach(opt => {
          opt.onclick = () => {
            const letter = opt.dataset.letter;
            if (q.type === '多选') {
              // 多选：toggle选中，不自动提交
              if (multiSelected.includes(letter)) {
                multiSelected = multiSelected.filter(l => l !== letter);
                opt.classList.remove('selected');
              } else {
                multiSelected.push(letter);
                opt.classList.add('selected');
              }
              if (isExam) answers[curIdx] = [...multiSelected];
              renderFooter(); // 更新提交按钮状态
            } else if (isExam) {
              userAnswer = letter;
              answers[curIdx] = letter;
              body.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
              opt.classList.add('selected');
            } else {
              if (answered) return;
              userAnswer = letter;
              submitAnswer();
            }
          };
        });
      }

      // 底部按钮
      renderFooter();
    }

    function renderFooter() {
      const isFirst = curIdx === 0;
      const isLast = curIdx === questions.length - 1;
      const q = questions[curIdx];
      const isMulti = q?.type === '多选';

      if (isExam) {
        footer.innerHTML = `
          <button class="btn btn-outline" ${isFirst?'disabled':''} onclick="this.closest('.page')._prev()" style="${isFirst?'opacity:0.4':''}">上一题</button>
          ${isLast
            ? `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._submitExam()">提交考试</button>`
            : `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._next()">下一题</button>`}
        `;
      } else {
        footer.innerHTML = `
          <button class="btn btn-outline" ${isFirst?'disabled':''} onclick="this.closest('.page')._prev()" style="${isFirst?'opacity:0.4':''}">上题</button>
          ${!answered
            ? (q?.type === '填空'
                ? `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._submitFill()">提交</button>`
                : isMulti
                  ? `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._submitMulti()" ${multiSelected.length===0?'disabled style="opacity:0.4"':''}>提交答案</button>`
                  : `<button class="btn btn-primary flex-1" disabled style="opacity:0.4">选择答案</button>`)
            : `<button class="btn btn-primary flex-1" onclick="this.closest('.page').${isLast ? '_finish' : '_next'}()">${isLast ? '完成' : '下一题'}</button>`
          }
        `;
      }
    }

    // 统一判断是否正确（支持多答案 q.answers 数组 或 单答案 q.answer）
    function isCorrect(q, ua) {
      if (!ua && ua !== 0) return false;
      const ans = q.answers && q.answers.length ? q.answers : q.answer;
      if (q.type === '填空') return Utils.matchFill(ua, ans);
      if (q.type === '多选') {
        // ua 是排序后的字母数组，q.answer 是字母字符串如 "ABC"
        const correctLetters = Array.isArray(q.answer)
          ? [...q.answer].sort().join('')
          : (q.answer||'').split('').filter(c=>/[A-Z]/.test(c)).sort().join('');
        const userLetters = Array.isArray(ua)
          ? [...ua].sort().join('')
          : (ua||'').split('').filter(c=>/[A-Z]/.test(c)).sort().join('');
        return userLetters === correctLetters;
      }
      if (Array.isArray(ans)) return ans.some(a => ua === a);
      return ua === ans;
    }

    async function submitAnswer() {
      const q = questions[curIdx];
      answered = true;
      answers[curIdx] = userAnswer;

      const correct = isCorrect(q, userAnswer);

      // 更新权重和统计
      if (!isExam) {
        const freshQ = (await DB.getAllQuestions()).find(x => x.id === q.id) || q;
        if (correct) {
          freshQ.rightCount = (freshQ.rightCount || 0) + 1;
          freshQ.weight = Math.max(1, (freshQ.weight || 1) - 0.3);
        } else {
          freshQ.wrongCount = (freshQ.wrongCount || 0) + 1;
          freshQ.weight = Math.min(10, (freshQ.weight || 1) + 0.5 + freshQ.wrongCount * 0.1);
        }
        Object.assign(q, freshQ);
        await DB.saveQuestion(freshQ);

        const totalAnswered = ((await DB.getMeta('totalAnswered')) || 0) + 1;
        const totalRight = ((await DB.getMeta('totalRight')) || 0) + (correct ? 1 : 0);
        const totalWrong = ((await DB.getMeta('totalWrong')) || 0) + (correct ? 0 : 1);
        await DB.setMeta('totalAnswered', totalAnswered);
        await DB.setMeta('totalRight', totalRight);
        await DB.setMeta('totalWrong', totalWrong);

        const pts = correct ? 2 : 0;
        const points = ((await DB.getMeta('points')) || 0) + pts;
        State.points = points;
        await DB.setMeta('points', points);
      }
      renderQ();
    }

    // 考试提交
    async function submitExam() {
      if (examTimer) clearInterval(examTimer);
      const timeTaken = Math.floor((Date.now() - examStartTime) / 1000);
      let right = 0;
      for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        const ua = answers[i];
        const correct = isCorrect(q, ua);
        if (correct) right++;
        const freshQ = (await DB.getAllQuestions()).find(x => x.id === q.id) || q;
        if (correct) {
          freshQ.rightCount = (freshQ.rightCount||0) + 1;
          freshQ.weight = Math.max(1, (freshQ.weight||1) - 0.3);
        } else if (ua !== null && ua !== undefined) {
          freshQ.wrongCount = (freshQ.wrongCount||0) + 1;
          freshQ.weight = Math.min(10, (freshQ.weight||1) + 0.5 + freshQ.wrongCount * 0.1);
        }
        await DB.saveQuestion(freshQ);
      }
      // 积分
      const examPoints = right * 3;
      const points = ((await DB.getMeta('points')) || 0) + examPoints;
      await DB.setMeta('points', points);
      // 更新总统计
      const ta = questions.length;
      await DB.setMeta('totalAnswered', ((await DB.getMeta('totalAnswered'))||0) + ta);
      await DB.setMeta('totalRight', ((await DB.getMeta('totalRight'))||0) + right);
      await DB.setMeta('totalWrong', ((await DB.getMeta('totalWrong'))||0) + (ta - right));
      // 显示成绩页
      showResult(right, questions.length, timeTaken, examPoints);
    }

    function showResult(right, total, timeSec, pts) {
      const pct = Math.round(right / total * 100);
      const grade = pct >= 90 ? '🎉 优秀' : pct >= 75 ? '👍 良好' : pct >= 60 ? '😊 及格' : '💪 继续加油';
      body.innerHTML = `
        <div class="result-score">
          <div class="result-circle" style="--pct:${pct}%">
            <div class="result-circle-inner">
              <div class="result-score-num">${pct}%</div>
              <div class="result-score-label">正确率</div>
            </div>
          </div>
          <div class="result-title">${grade}</div>
          <div class="result-sub">${right}/${total} 题正确 · 用时 ${Utils.fmtTime(timeSec)}</div>
        </div>
        <div class="stat-card" style="margin:0 0 12px">
          <div class="stat-row"><span class="stat-label">答对</span><span class="stat-val text-success">${right} 题</span></div>
          <div class="stat-row"><span class="stat-label">答错</span><span class="stat-val text-danger">${total - right} 题</span></div>
          <div class="stat-row"><span class="stat-label">未答</span><span class="stat-val">${answers.filter(a=>a===null).length} 题</span></div>
          <div class="stat-row"><span class="stat-label">本次获得积分</span><span class="stat-val"><span class="points-badge" style="font-size:14px">${Icons.coin}+${pts}</span></span></div>
        </div>
      `;
      footer.innerHTML = `
        <button class="btn btn-outline flex-1" onclick="this.closest('.page')._quit()">返回首页</button>
        <button class="btn btn-primary flex-1" onclick="this.closest('.page')._reviewExam()">查看解析</button>
      `;
      el._reviewExam = () => {
        // 切换到逐题查看模式
        curIdx = 0;
        // 标记为查看模式
        el._viewMode = true;
        renderQView();
      };
    }

    // 查看模式（考试后逐题）
    function renderQView() {
      const q = questions[curIdx];
      const ua = answers[curIdx];
      const correct = ua === q.answer ||
        (q.type === '填空' && ua && Utils.matchFill(ua, q.answer));
      // 用 el.querySelector 避免 document.getElementById 在离屏时失效
      const pf = el.querySelector('#quiz-progress');
      const ce = el.querySelector('#quiz-count');
      if (pf) pf.style.width = `${(curIdx+1)/questions.length*100}%`;
      if (ce) ce.textContent = `${curIdx+1}/${questions.length}`;

      let qBody = '';
      if (q.type === '单选' || q.type === '判断') {
        const opts = q.type === '单选' ? (q.options || []) : ['正确', '错误'];
        qBody = `<div class="option-list">
          ${opts.map((o, i) => {
            const letter = q.type === '单选' ? String.fromCharCode(65+i) : o;
            let cls = '';
            if (letter === q.answer) cls = 'correct';
            else if (letter === ua && ua !== q.answer) cls = 'wrong';
            return `<div class="option-item ${cls}" style="pointer-events:none">
              <div class="option-letter">${q.type === '单选' ? letter : (o === '正确' ? '✓' : '✗')}</div>
              <div class="option-text">${Utils.esc(o)}</div>
              ${letter === q.answer ? `<div style="margin-left:auto;color:var(--success)">${Icons.check}</div>` : ''}
            </div>`;
          }).join('')}
        </div>`;
      } else {
        qBody = `
          <div style="margin-bottom:10px">
            <div class="tag ${correct ? 'tag-success' : (ua ? 'tag-danger' : 'tag-warn')}">
              ${ua ? (correct ? '✓ 正确' : '✗ 错误') : '未作答'}
            </div>
            ${ua ? `<div style="margin-top:8px;padding:12px;background:var(--bg2);border-radius:10px;font-size:15px">你的答案：${Utils.esc(ua)}</div>` : ''}
          </div>
          <div style="background:var(--success-light);border-radius:10px;padding:12px">
            <div style="font-size:13px;color:var(--success);font-weight:600;margin-bottom:4px">正确答案</div>
            <div style="font-size:15px;color:var(--text)">${Utils.esc(q.answer)}</div>
          </div>
        `;
      }

      body.innerHTML = `
        <div class="quiz-type-badge">${q.type}</div>
        <div class="quiz-question">${Utils.esc(q.question)}</div>
        ${qBody}
        ${q.explanation ? `<div class="explanation-box"><div class="explanation-title">💡 解析</div><div class="explanation-text">${Utils.esc(q.explanation)}</div></div>` : ''}
      `;

      const isFirst = curIdx === 0, isLast = curIdx === questions.length - 1;
      footer.innerHTML = `
        <button class="btn btn-outline" ${isFirst?'disabled':''} onclick="this.closest('.page')._viewPrev()" style="${isFirst?'opacity:0.4':''}">上题</button>
        ${isLast
          ? `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._quit()">完成</button>`
          : `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._viewNext()">下题</button>`}
      `;
      el._viewPrev = () => { if (curIdx > 0) { curIdx--; renderQView(); } };
      el._viewNext = () => { if (curIdx < questions.length - 1) { curIdx++; renderQView(); } };
    }

    // 方法绑定
    el._quit = () => {
      // 弹出确认对话框
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay center';
      overlay.innerHTML = `
        <div class="modal-dialog" style="max-width:300px;text-align:center">
          <div style="font-size:40px;margin-bottom:8px">🚪</div>
          <div class="modal-title" style="margin-bottom:6px">退出做题？</div>
          <div style="font-size:14px;color:var(--text3);margin-bottom:20px">当前进度将不会保存</div>
          <div style="display:flex;gap:10px">
            <button class="btn btn-outline flex-1" onclick="this.closest('.modal-overlay').remove()">继续做题</button>
            <button class="btn btn-danger flex-1" id="confirm-quit-btn">确认退出</button>
          </div>
        </div>`;
      overlay.querySelector('#confirm-quit-btn').onclick = () => {
        overlay.remove();
        if (examTimer) clearInterval(examTimer);
        Nav.pop();
      };
      document.body.appendChild(overlay);
    };
    el._prev = () => { if (curIdx > 0) { curIdx--; multiSelected = []; renderQ(); } };
    el._next = () => { if (curIdx < questions.length - 1) { curIdx++; multiSelected = []; renderQ(); } };
    el._submitFill = () => {
      const inp = el.querySelector('#fill-answer');
      if (!inp) return;
      userAnswer = inp.value.trim();
      if (!userAnswer) { Utils.toast('请输入答案'); return; }
      submitAnswer();
    };
    el._submitMulti = () => {
      if (!multiSelected.length) { Utils.toast('请至少选择一个选项'); return; }
      userAnswer = [...multiSelected].sort();
      submitAnswer();
    };
    el._submitExam = () => submitExam();
    el._finish = async () => {
      const right = answers.filter((a, i) => isCorrect(questions[i], a)).length;
      Utils.toast(`完成！答对 ${right}/${questions.length} 题`);
      Nav.pop();
    };
    // 修正当前题目的答案（做题中发现答案有误时用）
    el._editAnswer = () => {
      const q = questions[curIdx];
      Actions.editAnswerInQuiz(q, () => {
        // 回调：刷新题目显示（用更新后的答案重新判断）
        const allDBQs = DB.getAllQuestions();
        allDBQs.then(dbqs => {
          const fresh = dbqs.find(x => x.id === q.id);
          if (fresh) Object.assign(q, fresh);
          renderQ();
        });
      });
    };

    // 考试计时器
    if (isExam && timeLimit > 0) {
      examTimer = setInterval(() => {
        examSecLeft--;
        const el2 = el.querySelector('#timer-text');
        if (el2) el2.textContent = Utils.fmtTime(examSecLeft);
        if (examSecLeft <= 0) { clearInterval(examTimer); submitExam(); }
      }, 1000);
    }

    renderQ();
    return el;
  },
};

/* =========================================================
   动作模块（Actions）
   ========================================================= */
const Actions = {
  // 切换主题
  async toggleTheme() {
    State.darkMode = !State.darkMode;
    document.documentElement.setAttribute('data-theme', State.darkMode ? 'dark' : '');
    document.querySelector('meta[name="color-scheme"]').setAttribute('content', State.darkMode ? 'only dark' : 'only light');
    await DB.setMeta('darkMode', State.darkMode);
    // 更新所有主题按钮图标
    document.querySelectorAll('#theme-btn').forEach(btn => {
      btn.innerHTML = State.darkMode ? Icons.sun : Icons.moon;
    });
  },

  // 导入JSON
  async importJSON() {
    const input = document.getElementById('import-input');
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      input.value = '';
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        let count = 0;
        // 支持格式：{ folders: [{name, questions:[...]}] } 或 { questions:[...] }
        if (data.folders) {
          for (const f of data.folders) {
            // 查找或创建文件夹
            const folders = await DB.getFolders();
            let folder = folders.find(x => x.name === f.name);
            if (!folder) {
              const id = await DB.saveFolder({ name: f.name, createdAt: Date.now() });
              folder = { id, name: f.name };
            }
            if (f.questions) {
              for (const q of f.questions) {
                const answers = q.answers && q.answers.length ? q.answers : (q.answer ? [String(q.answer)] : []);
                await DB.saveQuestion({
                  folderId: folder.id,
                  type: q.type || '填空',
                  question: q.question || q.content || '',
                  options: q.options,
                  answer: String(q.answer || ''),
                  answers,
                  explanation: q.explanation || '',
                  wrongCount: 0, rightCount: 0, weight: 1, starred: false,
                  createdAt: Date.now(),
                });
                count++;
              }
            }
          }
        } else if (data.questions) {
          const folders = await DB.getFolders();
          let folder = folders[0];
          if (!folder) {
            const id = await DB.saveFolder({ name: '导入题库', createdAt: Date.now() });
            folder = { id };
          }
          for (const q of data.questions) {
            await DB.saveQuestion({
              folderId: folder.id,
              type: q.type || '填空',
              question: q.question || '',
              options: q.options,
              answer: String(q.answer || ''),
              explanation: q.explanation || '',
              wrongCount: 0, rightCount: 0, weight: 1, starred: false,
              createdAt: Date.now(),
            });
            count++;
          }
        }
        Utils.toast(`成功导入 ${count} 道题目`);
        await Nav.refreshHome();
      } catch(e) {
        Utils.toast('导入失败，请检查文件格式');
        console.error(e);
      }
    };
    input.click();
  },

  // 导出JSON
  async exportJSON() {
    const folders = await DB.getFolders();
    const allQs = await DB.getAllQuestions();
    const data = {
      exportTime: new Date().toISOString(),
      folders: folders.map(f => ({
        name: f.name,
        questions: allQs.filter(q => q.folderId === f.id).map(q => ({
          type: q.type,
          question: q.question,
          options: q.options,
          answer: q.answer,
          answers: q.answers,
          explanation: q.explanation,
          wrongCount: q.wrongCount,
          rightCount: q.rightCount,
          starred: q.starred,
        }))
      }))
    };
    const json = JSON.stringify(data, null, 2);
    const filename = `刷题宝-${new Date().toLocaleDateString('zh').replace(/\//g,'-')}.json`;
    const blob = new Blob([json], { type: 'application/json' });

    // 优先使用 Web Share API（Android 原生分享，APK 里也能用）
    if (navigator.share && navigator.canShare) {
      try {
        const file = new File([blob], filename, { type: 'application/json' });
        if (navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: '刷题宝题库' });
          Utils.toast('已打开分享');
          return;
        }
      } catch(e) {
        if (e.name === 'AbortError') return; // 用户取消，不处理
        // 其他错误继续尝试下载
      }
    }

    // 回退方案：浏览器下载
    try {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
      Utils.toast('已开始下载');
    } catch(e) {
      // 最后回退：显示弹窗让用户手动复制
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay center';
      overlay.innerHTML = `
        <div class="modal-dialog" style="max-width:340px">
          <div class="modal-title">导出题库</div>
          <div class="modal-sub">长按下方内容全选复制，保存为 .json 文件</div>
          <textarea class="form-input form-textarea" style="min-height:200px;font-size:11px;font-family:monospace" readonly>${Utils.esc(json)}</textarea>
          <div style="display:flex;gap:10px;margin-top:12px">
            <button class="btn btn-outline flex-1" onclick="this.closest('.modal-overlay').remove()">关闭</button>
            <button class="btn btn-primary flex-1" onclick="navigator.clipboard?.writeText(${JSON.stringify(json)}).then(()=>Utils.toast('已复制到剪贴板'))">复制</button>
          </div>
        </div>`;
      overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
      document.body.appendChild(overlay);
    }
  },

  },

            ${Icons.trash} 删除文件夹
          </button>
          <button class="btn btn-outline btn-block" onclick="this.closest('.modal-overlay').remove()">取消</button>
        </div>
      </div>`;
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    document.body.appendChild(overlay);
  },
  _renameFolder(id, btn) {
    btn.closest('.modal-overlay').remove();
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay center';
    overlay.innerHTML = `
      <div class="modal-dialog" style="max-width:340px">
        <div class="modal-title">重命名文件夹</div>
        <input class="form-input" id="rename-input" placeholder="新名称" style="margin:12px 0 16px">
        <div style="display:flex;gap:10px">
          <button class="btn btn-outline flex-1" onclick="this.closest('.modal-overlay').remove()">取消</button>
          <button class="btn btn-primary flex-1" onclick="Actions._doRename(${id},this)">确认</button>
        </div>
      </div>`;
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    document.body.appendChild(overlay);
    setTimeout(() => overlay.querySelector('#rename-input').focus(), 100);
  },
  async _doRename(id, btn) {
    const input = document.getElementById('rename-input');
    const name = input?.value.trim();
    if (!name) { Utils.toast('请输入新名称'); return; }
    const folders = await DB.getFolders();
    const f = folders.find(x => x.id === id);
    if (f) { f.name = name; await DB.saveFolder(f); }
    btn.closest('.modal-overlay').remove();
    Utils.toast('已重命名');
    await Nav.refreshCurrent();
  },
  async _deleteFolder(id, btn) {
    btn.closest('.modal-overlay').remove();
    if (!confirm('确定删除此文件夹及其所有题目？此操作不可撤销。')) return;
    await DB.deleteFolder(id);
    Utils.toast('已删除');
    await Nav.refreshCurrent();
  },

  // 批量操作
  batchAction(folderId, selectedIds, onDone) {
    if (!selectedIds.length) { Utils.toast('请先选择题目'); return; }
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title" style="margin-bottom:4px">批量操作</div>
        <div class="modal-sub" style="margin-bottom:16px">已选 ${selectedIds.length} 道题目</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn btn-outline btn-block" onclick="Actions._batchStar(${JSON.stringify(selectedIds)}, true, this)">
            ${Icons.starFill} 批量收藏
          </button>
          <button class="btn btn-outline btn-block" onclick="Actions._batchStar(${JSON.stringify(selectedIds)}, false, this)">
            ${Icons.star} 取消收藏
          </button>
          <button class="btn btn-outline btn-block" onclick="Actions._batchResetStats(${JSON.stringify(selectedIds)}, this)">
            ${Icons.reset} 重置统计
          </button>
          <button class="btn btn-outline btn-block" onclick="Actions._batchMoveFolder(${JSON.stringify(selectedIds)}, this)">
            ${Icons.move} 移动文件夹
          </button>
          <button class="btn btn-outline btn-block" style="color:var(--danger);border-color:var(--danger)"
            onclick="Actions._batchDelete(${JSON.stringify(selectedIds)}, this)">
            ${Icons.trash} 删除所选
          </button>
          <button class="btn btn-outline btn-block" onclick="this.closest('.modal-overlay').remove()">取消</button>
        </div>
      </div>`;
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    overlay._onDone = onDone;
    document.body.appendChild(overlay);
  },
  async _batchStar(ids, star, btn) {
    const qs = await DB.getAllQuestions();
    for (const id of ids) {
      const q = qs.find(x => x.id === id);
      if (q) { q.starred = star; await DB.saveQuestion(q); }
    }
    btn.closest('.modal-overlay')._onDone?.();
    btn.closest('.modal-overlay').remove();
    Utils.toast(star ? '已批量收藏' : '已取消收藏');
  },
  async _batchResetStats(ids, btn) {
    const qs = await DB.getAllQuestions();
    for (const id of ids) {
      const q = qs.find(x => x.id === id);
      if (q) { q.wrongCount = 0; q.rightCount = 0; q.weight = 1; await DB.saveQuestion(q); }
    }
    btn.closest('.modal-overlay')._onDone?.();
    btn.closest('.modal-overlay').remove();
    Utils.toast('已重置统计');
  },
  async _batchMoveFolder(ids, btn) {
    btn.closest('.modal-overlay').remove();
    const folders = await DB.getFolders();
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title" style="margin-bottom:16px">选择目标文件夹</div>
        ${folders.map(f => `
          <div class="card-row" style="border-top:1px solid var(--border)" onclick="Actions._doMove(${JSON.stringify(ids)},${f.id},this)">
            <div class="card-row-content"><div class="card-row-title">${Utils.esc(f.name)}</div></div>
            <div class="card-row-arrow">${Icons.chevron}</div>
          </div>`).join('')}
        <div style="margin-top:12px"><button class="btn btn-outline btn-block" onclick="this.closest('.modal-overlay').remove()">取消</button></div>
      </div>`;
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    document.body.appendChild(overlay);
  },
  async _doMove(ids, newFolderId, btn) {
    const qs = await DB.getAllQuestions();
    for (const id of ids) {
      const q = qs.find(x => x.id === id);
      if (q) { q.folderId = newFolderId; await DB.saveQuestion(q); }
    }
    btn.closest('.modal-overlay').remove();
    Utils.toast('已移动');
    await Nav.refreshCurrent();
  },
  async _batchDelete(ids, btn) {
    btn.closest('.modal-overlay').remove();
    if (!confirm(`确定删除选中的 ${ids.length} 道题目？`)) return;
    for (const id of ids) await DB.deleteQuestion(id);
    Utils.toast(`已删除 ${ids.length} 道题目`);
    await Nav.refreshCurrent();
  },

  // 重置所有统计
  async resetAllStats() {
    if (!confirm('确定重置所有统计数据（积分、答题记录）？题目不会被删除。')) return;
    const qs = await DB.getAllQuestions();
    for (const q of qs) {
      q.wrongCount = 0; q.rightCount = 0; q.weight = 1;
      await DB.saveQuestion(q);
    }
    await DB.setMeta('points', 0);
    await DB.setMeta('totalAnswered', 0);
    await DB.setMeta('totalRight', 0);
    await DB.setMeta('totalWrong', 0);
    Utils.toast('统计已重置');
    await Nav.pop();
    await Nav.push('stats', {});
  },
};

/* =========================================================
   初始化示例数据
   ========================================================= */
/* =========================================================
   拦截手机物理返回键 → 返回首页
   ========================================================= */
window.addEventListener('popstate', (e) => {
  // 阻止默认返回行为
  history.pushState(null, '', location.href);
  const app = document.getElementById('app');
  const pages = app.querySelectorAll('.page');
  if (pages.length > 1) Nav.home();
  // 如果已在首页，什么都不做（阻止退出）
});

/* =========================================================
   应用入口
   ========================================================= */
async function main() {
  // 初始化数据库
  await DB.init();

  // 恢复主题设置
  const savedTheme = await DB.getMeta('darkMode');
  if (savedTheme) {
    State.darkMode = true;
    document.documentElement.setAttribute('data-theme', 'dark');
    document.querySelector('meta[name="color-scheme"]').setAttribute('content', 'only dark');
  }

  // 渲染首页
  await Pages.renderHome();

  // 添加popstate历史记录（防止物理返回键退出）
  history.pushState(null, '', location.href);
}

// 启动
main().catch(console.error);
</script>
